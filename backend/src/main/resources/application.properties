spring.application.name=librario

# SQL Server 2022 / LibraryManagementDB
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=LibraryManagementDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# The database is provisioned by LibraryManagementDB.sql. Do not let Hibernate
# create legacy tables that are not part of that schema.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

server.port=8080

# JWT signing key must be supplied outside source control in deployed environments.
# Local default is for development only — override with JWT_SECRET in production.
app.jwt.secret=${JWT_SECRET:librario-local-dev-secret-key-32b}

# Mail is optional for local runs. Configure real SMTP to enable notifications.
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
